<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaffleBrain — Teacher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header>
    <div class="logo-group">
      <img src="images/logo.png" alt="WaffleBrain" class="logo-img">
      <span class="logo-subtitle">For teachers</span>
    </div>
    <nav class="version-nav" aria-label="Switch version">
      <a href="index.html"   class="version-link active"   aria-current="page">Teacher</a>
      <a href="student.html" class="version-link inactive">Student</a>
    </nav>
    <span class="counter" id="counter">—</span>
  </header>

  <div class="selector-bar">
    <select id="level-select" aria-label="Student level">
      <option value="A1">Beginner (A1/A2)</option>
      <option value="B1" selected>Intermediate (B1)</option>
      <option value="B2+">Advanced (B2+)</option>
    </select>
    <select id="category-select" aria-label="Filter by category">
      <option value="">All categories</option>
      <option value="Role Shift">Role Shift</option>
      <option value="Monologue">Monologue</option>
      <option value="Reversal">Reversal</option>
      <option value="Opinion Fight">Opinion Fight</option>
      <option value="Language Rule">Language Rule</option>
      <option value="Hypothetical">Hypothetical</option>
      <option value="Story Mode">Story Mode</option>
      <option value="Real Talk">Real Talk</option>
      <option value="Big Question">Big Question</option>
      <option value="Quick Fire">Quick Fire</option>
    </select>
  </div>

  <div id="prompt-card">
    <span class="mode-badge" id="mode-label">Loading</span>
    <p id="prompt-text"></p>
    <div class="divider"></div>
    <div class="constraint-block">
      <span class="constraint-label">Language Focus</span>
      <p id="constraint-text"></p>
    </div>
    <button id="copy-btn" aria-label="Copy prompt to clipboard">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="4" y="4" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 4V2.8A.8.8 0 0 0 7.2 2H1.8A.8.8 0 0 0 1 2.8v5.4c0 .44.36.8.8.8H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Copy prompt
    </button>
  </div>

  <div class="btn-wrap">
    <button id="back-btn" disabled aria-label="Go to previous prompt">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M13 8H3M7 4L3 8l4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="next-btn" disabled>
      Next prompt
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <footer>Press <kbd>Space</kbd> for next prompt</footer>

</div>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
