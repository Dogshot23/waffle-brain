<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaffleBrain — Teacher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg:           #F7F6F3;
    --surface:      #FFFFFF;
    --border:       #E4E2DC;
    --border-light: #EDECE8;

    --text-primary:   #1C1C1E;
    --text-secondary: #5C5C6E;
    --text-tertiary:  #9898A6;

    --badge-bg:       #EEF2FF;
    --badge-text:     #3B5BDB;

    --constraint-bg:    #FFFBF0;
    --constraint-border:#FDE89A;
    --constraint-label: #B45309;
    --constraint-text:  #44360A;

    --btn-bg:         #3B5BDB;
    --btn-bg-hover:   #3451C7;
    --btn-bg-active:  #2F47B3;
    --btn-text:       #FFFFFF;

    --flash-ring:     rgba(59, 91, 219, 0.18);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #app {
    width: 100%;
    max-width: 380px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 20px;
    gap: 0;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .logo-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .logo-img {
    display: block;
    height: 36px;
    width: auto;
    object-fit: contain;
    object-position: left center;
  }

  .logo-subtitle {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.01em;
    line-height: 1;
    padding-left: 1px;
  }

  /* ── Version nav ── */
  .version-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .version-link {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-decoration: none;
    padding: 4px 9px;
    border-radius: 6px;
    transition: background 0.1s ease, color 0.1s ease;
  }

  .version-link.active {
    background: var(--btn-bg);
    color: #fff;
  }

  .version-link.inactive {
    color: var(--text-tertiary);
    background: transparent;
    border: 1px solid var(--border);
  }

  .version-link.inactive:hover {
    color: var(--text-secondary);
    border-color: var(--text-tertiary);
    background: var(--bg);
  }

  .counter {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
  }

  /* ── Main card ── */
  #prompt-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  #prompt-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: 0 0 0 0 var(--flash-ring);
    transition: box-shadow 0s;
    pointer-events: none;
  }

  #prompt-card.flash::before {
    box-shadow: 0 0 0 4px var(--flash-ring);
  }

  /* ── Mode badge ── */
  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px 3px 7px;
    border-radius: 100px;
    align-self: flex-start;
    margin-bottom: 14px;
    white-space: nowrap;
  }

  .mode-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
    flex-shrink: 0;
  }

  /* Per-mode badge colours */
  #prompt-card[data-mode="Role Shift"]      .mode-badge { --badge-bg: #FFF0F6; --badge-text: #C2255C; }
  #prompt-card[data-mode="Monologue"]       .mode-badge { --badge-bg: #FFF3BF; --badge-text: #845E00; }
  #prompt-card[data-mode="Reversal"]        .mode-badge { --badge-bg: #E8F5E9; --badge-text: #2E7D32; }
  #prompt-card[data-mode="Opinion Fight"]   .mode-badge { --badge-bg: #FFF0E8; --badge-text: #C04B00; }
  #prompt-card[data-mode="Language Rule"]   .mode-badge { --badge-bg: #EEF2FF; --badge-text: #3B5BDB; }
  #prompt-card[data-mode="Hypothetical"]    .mode-badge { --badge-bg: #F3F0FF; --badge-text: #6741D9; }
  #prompt-card[data-mode="Story Mode"]      .mode-badge { --badge-bg: #E8F8F5; --badge-text: #0E7490; }
  #prompt-card[data-mode="Real Talk"]       .mode-badge { --badge-bg: #FFF0F0; --badge-text: #B91C1C; }
  #prompt-card[data-mode="Big Question"]    .mode-badge { --badge-bg: #F0F4FF; --badge-text: #1D4ED8; }
  #prompt-card[data-mode="Quick Fire"]      .mode-badge { --badge-bg: #FFF7ED; --badge-text: #C2410C; }

  /* ── Prompt text ── */
  #prompt-text {
    font-family: 'Lora', Georgia, serif;
    font-style: italic;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 18px;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border-light);
    margin-bottom: 14px;
  }

  /* ── Constraint block ── */
  .constraint-block {
    background: var(--constraint-bg);
    border: 1px solid var(--constraint-border);
    border-radius: 8px;
    padding: 11px 13px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .constraint-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--constraint-label);
  }

  #constraint-text {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--constraint-text);
  }

  /* ── Copy button ── */
  #copy-btn {
    align-self: flex-start;
    margin-top: 12px;
    padding: 5px 11px;
    background: transparent;
    color: var(--text-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.1s ease, border-color 0.1s ease, background 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  #copy-btn svg {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
    transition: opacity 0.1s ease;
  }

  #copy-btn:hover {
    color: var(--text-secondary);
    border-color: var(--text-tertiary);
    background: var(--bg);
  }

  #copy-btn:active { transform: translateY(1px); }

  #copy-btn.copied {
    color: #2E7D32;
    border-color: #A5D6A7;
    background: #F1F8F1;
  }

  #copy-btn:focus-visible {
    outline: 2px solid var(--btn-bg);
    outline-offset: 2px;
  }

  /* ── Button ── */
  .btn-wrap { margin-top: 10px; }

  #next-btn {
    width: 100%;
    padding: 15px 20px;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.1s ease, transform 0.07s ease, box-shadow 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 1px 3px rgba(59,91,219,0.2), 0 4px 12px rgba(59,91,219,0.12);
  }

  #next-btn svg {
    width: 15px;
    height: 15px;
    opacity: 0.85;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  #next-btn:hover {
    background: var(--btn-bg-hover);
    box-shadow: 0 1px 3px rgba(59,91,219,0.25), 0 6px 16px rgba(59,91,219,0.18);
  }

  #next-btn:hover svg { transform: translateX(2px); }

  #next-btn:active {
    background: var(--btn-bg-active);
    transform: translateY(1px);
    box-shadow: 0 1px 2px rgba(59,91,219,0.15);
  }

  #next-btn:focus-visible {
    outline: 2px solid var(--btn-bg);
    outline-offset: 3px;
  }

  /* ── Footer ── */
  footer {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-tertiary);
    text-align: center;
    letter-spacing: 0.01em;
  }

  footer kbd {
    display: inline-block;
    background: var(--border);
    color: var(--text-secondary);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid #D4D2CC;
  }

  /* ── Category selector ── */
  .selector-bar {
    margin-bottom: 10px;
    padding: 0 2px;
  }

  #category-select {
    width: 100%;
    padding: 8px 32px 8px 11px;
    background: var(--surface);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239898A6' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 11px center;
    transition: border-color 0.1s ease, box-shadow 0.1s ease;
  }

  #category-select:hover { border-color: var(--text-tertiary); }

  #category-select:focus {
    outline: none;
    border-color: var(--btn-bg);
    box-shadow: 0 0 0 3px var(--flash-ring);
  }

  #category-select.filtered {
    border-color: var(--btn-bg);
    color: var(--btn-bg);
    font-weight: 600;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%233B5BDB' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    #next-btn, #prompt-card::before { transition: none; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo-group">
      <img src="images/logo.png" alt="WaffleBrain" class="logo-img">
      <span class="logo-subtitle">For teachers</span>
    </div>
    <nav class="version-nav" aria-label="Switch version">
      <a href="index.html"   class="version-link active"   aria-current="page">Teacher</a>
      <a href="student.html" class="version-link inactive">Student</a>
    </nav>
    <span class="counter" id="counter">—</span>
  </header>

  <div class="selector-bar">
    <select id="category-select" aria-label="Filter by category">
      <option value="">All categories</option>
      <option value="Role Shift">Role Shift</option>
      <option value="Monologue">Monologue</option>
      <option value="Reversal">Reversal</option>
      <option value="Opinion Fight">Opinion Fight</option>
      <option value="Language Rule">Language Rule</option>
      <option value="Hypothetical">Hypothetical</option>
      <option value="Story Mode">Story Mode</option>
      <option value="Real Talk">Real Talk</option>
      <option value="Big Question">Big Question</option>
      <option value="Quick Fire">Quick Fire</option>
    </select>
  </div>

  <div id="prompt-card">
    <span class="mode-badge" id="mode-label">Loading</span>
    <p id="prompt-text"></p>
    <div class="divider"></div>
    <div class="constraint-block">
      <span class="constraint-label">Language Focus</span>
      <p id="constraint-text"></p>
    </div>
    <button id="copy-btn" aria-label="Copy prompt to clipboard">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="4" y="4" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 4V2.8A.8.8 0 0 0 7.2 2H1.8A.8.8 0 0 0 1 2.8v5.4c0 .44.36.8.8.8H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Copy prompt
    </button>
  </div>

  <div class="btn-wrap">
    <button id="next-btn" disabled>
      Next prompt
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <footer>Press <kbd>Space</kbd> for next prompt</footer>

</div>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
