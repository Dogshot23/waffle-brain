<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaffleBrain — Student</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg:           #F7F6F3;
    --surface:      #FFFFFF;
    --border:       #E4E2DC;
    --border-light: #EDECE8;

    --text-primary:   #1C1C1E;
    --text-secondary: #5C5C6E;
    --text-tertiary:  #9898A6;

    --badge-bg:       #EEF2FF;
    --badge-text:     #3B5BDB;

    --btn-bg:         #D4610B;
    --btn-bg-hover:   #C05509;
    --btn-bg-active:  #AB4A08;
    --btn-text:       #FFFFFF;

    --flash-ring:     rgba(212, 97, 11, 0.18);

    /* Topic label */
    --topic-label:  #9898A6;

    /* Useful English block */
    --practice-bg:     #F0F4FF;
    --practice-border: #C7D4F8;
    --practice-label:  #2F4AB3;
    --practice-text:   #1A2D6B;

    /* Try saying block */
    --starter-bg:     #F0FBF4;
    --starter-border: #B6E8C8;
    --starter-label:  #1A6B3A;
    --starter-text:   #0E3D22;

    /* Keep the conversation going block */
    --followup-bg:     #FFF7ED;
    --followup-border: #FED7AA;
    --followup-label:  #9A3412;
    --followup-text:   #431407;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #app {
    width: 100%;
    max-width: 380px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 20px;
    gap: 0;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .logo-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .logo-img {
    display: block;
    height: 54px;
    width: auto;
    object-fit: contain;
    object-position: left center;
  }

  @media (max-width: 600px) {
    .logo-img {
      height: 44px;
    }
  }

  .logo-subtitle {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.01em;
    line-height: 1;
    padding-left: 1px;
  }

  /* ── Version nav ── */
  .version-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .version-link {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-decoration: none;
    padding: 4px 9px;
    border-radius: 6px;
    transition: background 0.1s ease, color 0.1s ease;
  }

  .version-link.active {
    background: var(--btn-bg);
    color: #fff;
  }

  .version-link.inactive {
    color: var(--text-tertiary);
    background: transparent;
    border: 1px solid var(--border);
  }

  .version-link.inactive:hover {
    color: var(--text-secondary);
    border-color: var(--text-tertiary);
    background: var(--bg);
  }

  /* ── Main card ── */
  #prompt-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    overflow: hidden;
  }

  #prompt-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: 0 0 0 0 var(--flash-ring);
    transition: box-shadow 0s;
    pointer-events: none;
  }

  #prompt-card.flash::before {
    box-shadow: 0 0 0 4px var(--flash-ring);
  }

  /* ── Topic section ── */
  .topic-section {
    margin-bottom: 14px;
  }

  .topic-eyebrow {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--topic-label);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .topic-eyebrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  /* Mode badge — sits inside topic section */
  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px 3px 7px;
    border-radius: 100px;
    align-self: flex-start;
    margin-bottom: 10px;
    white-space: nowrap;
  }

  .mode-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
    flex-shrink: 0;
  }

  #prompt-card[data-mode="Role Shift"]      .mode-badge { --badge-bg: #FFF0F6; --badge-text: #C2255C; }
  #prompt-card[data-mode="Monologue"]       .mode-badge { --badge-bg: #FFF3BF; --badge-text: #845E00; }
  #prompt-card[data-mode="Reversal"]        .mode-badge { --badge-bg: #E8F5E9; --badge-text: #2E7D32; }
  #prompt-card[data-mode="Opinion Fight"]   .mode-badge { --badge-bg: #FFF0E8; --badge-text: #C04B00; }
  #prompt-card[data-mode="Language Rule"]   .mode-badge { --badge-bg: #EEF2FF; --badge-text: #3B5BDB; }
  #prompt-card[data-mode="Hypothetical"]    .mode-badge { --badge-bg: #F3F0FF; --badge-text: #6741D9; }
  #prompt-card[data-mode="Story Mode"]      .mode-badge { --badge-bg: #E8F8F5; --badge-text: #0E7490; }
  #prompt-card[data-mode="Real Talk"]       .mode-badge { --badge-bg: #FFF0F0; --badge-text: #B91C1C; }
  #prompt-card[data-mode="Big Question"]    .mode-badge { --badge-bg: #F0F4FF; --badge-text: #1D4ED8; }
  #prompt-card[data-mode="Quick Fire"]      .mode-badge { --badge-bg: #FFF7ED; --badge-text: #C2410C; }

  /* ── Main prompt text ── */
  #prompt-text {
    font-family: 'Lora', Georgia, serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  /* ── Info blocks ── */
  .info-block {
    border-radius: 8px;
    padding: 10px 12px 11px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }

  .info-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }

  /* Useful English */
  .info-block.practice {
    background: var(--practice-bg);
    border: 1px solid var(--practice-border);
  }

  .info-block.practice .info-label { color: var(--practice-label); }

  #practice-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  #practice-list li {
    font-size: 12px;
    font-weight: 500;
    color: var(--practice-text);
    line-height: 1.4;
    padding-left: 12px;
    position: relative;
  }

  #practice-list li::before {
    content: '·';
    position: absolute;
    left: 2px;
    color: var(--practice-label);
    font-weight: 700;
  }

  /* Try saying */
  .info-block.starters {
    background: var(--starter-bg);
    border: 1px solid var(--starter-border);
  }

  .info-block.starters .info-label { color: var(--starter-label); }

  #starter-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  #starter-list li {
    font-size: 12.5px;
    font-weight: 400;
    font-style: italic;
    color: var(--starter-text);
    line-height: 1.45;
    padding-left: 13px;
    position: relative;
  }

  #starter-list li::before {
    content: '"';
    position: absolute;
    left: 1px;
    color: var(--starter-label);
    font-style: normal;
    font-weight: 700;
    font-size: 12px;
    line-height: 1.3;
  }

  /* Keep the conversation going */
  .info-block.followup {
    background: var(--followup-bg);
    border: 1px solid var(--followup-border);
  }

  .info-block.followup .info-label { color: var(--followup-label); }

  #follow-up-text {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--followup-text);
    line-height: 1.5;
  }

  /* ── Button ── */
  .btn-wrap { margin-top: 10px; }

  #next-btn {
    width: 100%;
    padding: 15px 20px;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.1s ease, transform 0.07s ease, box-shadow 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 1px 3px rgba(212,97,11,0.2), 0 4px 12px rgba(212,97,11,0.12);
  }

  #next-btn svg {
    width: 15px;
    height: 15px;
    opacity: 0.85;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  #next-btn:hover {
    background: var(--btn-bg-hover);
    box-shadow: 0 1px 3px rgba(212,97,11,0.25), 0 6px 16px rgba(212,97,11,0.18);
  }

  #next-btn:hover svg { transform: translateX(2px); }

  #next-btn:active {
    background: var(--btn-bg-active);
    transform: translateY(1px);
    box-shadow: 0 1px 2px rgba(212,97,11,0.15);
  }

  #next-btn:focus-visible {
    outline: 2px solid var(--btn-bg);
    outline-offset: 3px;
  }

  /* ── Footer ── */
  footer {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-tertiary);
    text-align: center;
    letter-spacing: 0.01em;
  }

  footer kbd {
    display: inline-block;
    background: var(--border);
    color: var(--text-secondary);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid #D4D2CC;
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    #next-btn, #prompt-card::before { transition: none; }
  }

  /* ────────────────────────────────────────────────────────
     MOBILE LAYOUT FIX
     Problem: #prompt-card has flex:1 which makes it grow to
     fill the entire #app height (100vh). The button lives
     outside the card, so it gets pushed below the screen.
     Fix: on mobile the card stops growing and takes only
     the space its content needs.
  ──────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    #app {
      padding-top: 12px;
      padding-bottom: 14px;
    }

    header {
      margin-bottom: 10px;
    }

    /* Core fix: card no longer stretches to fill viewport */
    #prompt-card {
      flex: 0 1 auto;
      padding: 14px 16px 16px;
    }

    .topic-section {
      margin-bottom: 10px;
    }

    .topic-eyebrow {
      margin-bottom: 6px;
    }

    .mode-badge {
      margin-bottom: 8px;
    }

    #prompt-text {
      font-size: 16px;
      line-height: 1.5;
    }

    .info-block {
      margin-top: 8px;
      padding: 9px 11px 10px;
    }

    .btn-wrap {
      margin-top: 8px;
    }

    #next-btn {
      padding: 13px 20px;
    }

    footer {
      margin-top: 8px;
    }
  }

  /* Extra compact for shorter phones (iPhone SE = 667px tall,
     or any phone in landscape) */
  @media (max-width: 600px) and (max-height: 720px) {
    #app {
      padding-top: 8px;
      padding-bottom: 10px;
    }

    header {
      margin-bottom: 7px;
    }

    #prompt-card {
      padding: 11px 13px 13px;
    }

    .topic-section {
      margin-bottom: 8px;
    }

    .topic-eyebrow {
      margin-bottom: 5px;
    }

    .mode-badge {
      margin-bottom: 6px;
    }

    #prompt-text {
      font-size: 15px;
    }

    .info-block {
      margin-top: 6px;
      padding: 8px 10px 9px;
      gap: 4px;
    }

    #practice-list li,
    #starter-list li {
      font-size: 11.5px;
    }

    #follow-up-text {
      font-size: 12px;
    }

    .btn-wrap {
      margin-top: 6px;
    }

    #next-btn {
      padding: 12px 20px;
    }

    footer {
      margin-top: 6px;
    }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo-group">
      <img src="images/logo.png" alt="WaffleBrain" class="logo-img">
      <span class="logo-subtitle">For students</span>
    </div>
    <nav class="version-nav" aria-label="Switch version">
      <a href="index.html"   class="version-link inactive">Teacher</a>
      <a href="student.html" class="version-link active" aria-current="page">Student</a>
    </nav>
  </header>

  <div id="prompt-card">

    <div class="topic-section">
      <div class="topic-eyebrow">Topic</div>
      <span class="mode-badge" id="mode-label">Loading</span>
      <p id="prompt-text"></p>
    </div>

    <div class="info-block practice">
      <span class="info-label">Useful English</span>
      <ul id="practice-list"></ul>
    </div>

    <div class="info-block starters">
      <span class="info-label">Try saying</span>
      <ul id="starter-list"></ul>
    </div>

    <div class="info-block followup">
      <span class="info-label">Keep the conversation going</span>
      <p id="follow-up-text"></p>
    </div>

  </div>

  <div class="btn-wrap">
    <button id="next-btn" disabled>
      Next prompt
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <footer>Press <kbd>Space</kbd> for next prompt</footer>

</div>

<script src="engine.js"></script>
<script src="student.js"></script>
</body>
</html>
